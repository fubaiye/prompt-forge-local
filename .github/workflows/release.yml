name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run pack:win

      - name: Publish GitHub release
        shell: pwsh
        run: |
          gh release view $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --title $env:GITHUB_REF_NAME --generate-notes --latest
          }
          gh release upload $env:GITHUB_REF_NAME release/PromptForge-Setup-*.exe release/PromptForge-Setup-*.exe.blockmap release/latest.yml --repo $env:GITHUB_REPOSITORY --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
