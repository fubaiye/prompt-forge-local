name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ensure-release:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure GitHub release exists
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --generate-notes --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows-installer:
    needs: ensure-release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run pack:win

      - name: Publish GitHub release
        shell: pwsh
        run: |
          gh release upload $env:GITHUB_REF_NAME release/PromptForge-Setup-*.exe release/PromptForge-Setup-*.exe.blockmap release/latest.yml --repo $env:GITHUB_REPOSITORY --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  nas-docker-image:
    needs: ensure-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build NAS Docker image tar for amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          tags: prompt-forge-local:${{ github.ref_name }}
          outputs: type=docker,dest=release/prompt-forge-local-${{ github.ref_name }}-linux-amd64.tar

      - name: Build NAS Docker image tar for arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          tags: prompt-forge-local:${{ github.ref_name }}
          outputs: type=docker,dest=release/prompt-forge-local-${{ github.ref_name }}-linux-arm64.tar

      - name: Publish NAS Docker image tar
        run: gh release upload "$GITHUB_REF_NAME" release/prompt-forge-local-*-linux-amd64.tar release/prompt-forge-local-*-linux-arm64.tar --repo "$GITHUB_REPOSITORY" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
